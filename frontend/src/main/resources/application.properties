# Smart Mobility Dashboard - Frontend Configuration

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Backend API Client Configuration
quarkus.rest-client.backend-api.url=http://localhost:8081
quarkus.rest-client.backend-api.scope=jakarta.enterprise.context.ApplicationScoped

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Container Configuration
quarkus.container-image.name=smart-mobility-frontend
quarkus.container-image.tag=latest
