apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-mobility-backend
  labels:
    app: smart-mobility
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-mobility
      component: backend
  template:
    metadata:
      labels:
        app: smart-mobility
        component: backend
    spec:
      containers:
        - name: backend
          image: quay.io/rh_ee_kmotojim/smart-mobility-backend:latest
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/vehicle/state
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/vehicle/state
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: smart-mobility
    component: backend
spec:
  selector:
    app: smart-mobility
    component: backend
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
