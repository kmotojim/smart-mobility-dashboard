apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-mobility-frontend
  labels:
    app: smart-mobility
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-mobility
      component: frontend
  template:
    metadata:
      labels:
        app: smart-mobility
        component: frontend
    spec:
      containers:
        - name: frontend
          image: quay.io/rh_ee_kmotojim/smart-mobility-frontend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"
            - name: QUARKUS_REST_CLIENT_BACKEND_API_URL
              value: "http://backend:8081"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: smart-mobility
    component: frontend
spec:
  selector:
    app: smart-mobility
    component: frontend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# OpenShift Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: smart-mobility-dashboard
  labels:
    app: smart-mobility
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
