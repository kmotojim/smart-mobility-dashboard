version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-mobility-backend
    ports:
      - "8081:8081"
    environment:
      - QUARKUS_HTTP_HOST=0.0.0.0
    networks:
      - mobility-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/vehicle/state"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-mobility-frontend
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_HTTP_HOST=0.0.0.0
      - QUARKUS_REST_CLIENT_BACKEND_API_URL=http://backend:8081
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mobility-network

networks:
  mobility-network:
    driver: bridge
