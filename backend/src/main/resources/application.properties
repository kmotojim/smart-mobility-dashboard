# Smart Mobility Dashboard - Backend Configuration

# HTTP Configuration
quarkus.http.port=8081
quarkus.http.host=0.0.0.0

# Test Configuration (use random available port)
quarkus.http.test-port=0

# CORS Configuration (for frontend communication)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080,http://frontend:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Container Configuration
quarkus.container-image.name=smart-mobility-backend
quarkus.container-image.tag=latest
